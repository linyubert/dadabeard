<script>
(()=>{
  const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo'),healthEl=document.getElementById('health'),menu=document.getElementById('menu'),end=document.getElementById('end'),phaseEl=document.getElementById('phase'),feedback=document.getElementById('feedback'),landing=document.getElementById('landing');
  const startBtn=document.getElementById('startBtn'),homeStartBtn=document.getElementById('homeStartBtn'),againBtn=document.getElementById('againBtn'),muteBtn=document.getElementById('muteBtn');
  let audio,master,muted=false,running=false,startTime=0,raf=0,score=0,combo=0,maxCombo=0,hp=5,hits=0,total=0,events=[],demoEvents=[],rounds=[],hairs=[],particles=[],faceShake=0,holding=null,lastDemo=-1,lastRound=-1,scheduledNodes=[],homeBgmAudio=null;
  const BPM=112,beat=60/BPM,hitWindow=.14,travel=2.1,targetX=W/2,laneY=H-82;
  // 將你的 BGM 以 data URI 方式貼到這裡，例如：data:audio/mp3;base64,AAAA...
  // 留空時首頁不會播放 BGM。
  const HOME_BGM_DATA_URI = 'assets/home_bgm.mp3';
  const roundDefs=[
    // All notes are quantized to fixed beats. Variations come from rests, repeated fixed beats, and 1/2-beat holds.
    [[0,'n'],[1,'n'],[2,'n'],[3,'n']],                         // 1 2 3 4
    [[0,'n'],[2,'n'],[3,'n']],                                 // 1 _ 3 4
    [[0,'n'],[1,'n'],[3,'n']],                                 // 1 2 _ 4
    [[0,'h',1],[2,'n'],[3,'n']],                               // hold 1 beat, then 3 4
    [[0,'n'],[2,'h',1],[4,'n']],                               // 1 _ hold _ 5
    [[0,'n'],[1,'n'],[2,'n'],[4,'n'],[5,'n']],                 // 1 2 3 _ 5 6
    [[0,'h',2],[3,'n'],[4,'n']],                               // long hold then fixed hits
    [[0,'n'],[1,'n'],[2,'h',2],[5,'n'],[6,'n']]                // final fixed-beat phrase
  ];
  function buildTimeline(){
    events=[];demoEvents=[];rounds=[];let cursor=3,id=0;
    roundDefs.forEach((notes,ri)=>{const len=Math.max(...notes.map(n=>n[0]+(n[2]||0)))+1;const demoStart=cursor,playStart=demoStart+len+2,endBeat=playStart+len+1.2;rounds.push({demoStart,playStart,endBeat,len,index:ri});notes.forEach(n=>{demoEvents.push({id:'d'+id,time:(demoStart+n[0])*beat,kind:n[1],dur:(n[2]||0)*beat,round:ri,hairIndex:id});events.push({id:id,time:(playStart+n[0])*beat,kind:n[1],dur:(n[2]||0)*beat,hit:false,missed:false,released:false,hairIndex:id,round:ri});id++});cursor=endBeat+1.4});total=events.length;hairs=events.map((e,i)=>{const side=i%2?-1:1,slot=i%11,row=Math.floor(i/11);let band=i%5;let x,y,angle;if(band===0){x=W/2+side*(34+slot*7)+Math.sin(i)*3;y=424+row*14+Math.cos(i)*2;angle=side*.75}else if(band===1){x=W/2+side*(72+slot*6);y=398+(slot%3)*15+row*8;angle=side*.95}else if(band===2){x=W/2+side*(22+slot*6);y=462+row*13+Math.sin(i)*3;angle=side*.25}else if(band===3){x=W/2+side*(110+slot*3);y=432+(slot%3)*13+row*7;angle=side*.55}else{x=W/2+side*(52+slot*8);y=492+row*9+Math.sin(i)*2;angle=side*.18}return{x,y,angle,len:e.kind==='h'?42:25,gone:false,grown:false,growStart:-999,growDur:e.kind==='h'?e.dur:.22,tug:false,long:e.kind==='h'}})}
  function initAudio(){if(audio)return;audio=new(window.AudioContext||window.webkitAudioContext)();master=audio.createGain();master.gain.value=.55;master.connect(audio.destination)}
  function startHomeBgm(){if(!HOME_BGM_DATA_URI||muted)return;if(!homeBgmAudio){homeBgmAudio=new Audio(HOME_BGM_DATA_URI);homeBgmAudio.loop=true;homeBgmAudio.volume=.22}homeBgmAudio.currentTime=0;homeBgmAudio.play().catch(()=>{})}
  function stopHomeBgm(){if(homeBgmAudio){homeBgmAudio.pause();homeBgmAudio.currentTime=0}}
  function trackNode(n){scheduledNodes.push(n);n.onended=()=>{scheduledNodes=scheduledNodes.filter(x=>x!==n)}}function stopScheduledAudio(){for(const n of scheduledNodes){try{n.stop(0)}catch(e){}}scheduledNodes=[]}function tone(freq,t,dur=.06,type='square',vol=.18){if(!audio||muted)return;const o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+.005);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.03);trackNode(o)}
  function noise(t,dur=.12,vol=.16){if(!audio||muted)return;const b=audio.createBuffer(1,audio.sampleRate*dur,audio.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=audio.createBufferSource(),g=audio.createGain();s.buffer=b;g.gain.value=vol;s.connect(g);g.connect(master);s.start(t);trackNode(s)}
  function smallDrum(t,vol=.22){if(!audio||muted)return;const o=audio.createOscillator(),g=audio.createGain();o.type='sine';o.frequency.setValueAtTime(185,t);o.frequency.exponentialRampToValueAtTime(82,t+.12);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+.004);g.gain.exponentialRampToValueAtTime(.0001,t+.14);o.connect(g);g.connect(master);o.start(t);o.stop(t+.16);const b=audio.createBuffer(1,Math.floor(audio.sampleRate*.055),audio.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const n=audio.createBufferSource(),ng=audio.createGain();n.buffer=b;ng.gain.setValueAtTime(vol*.28,t);ng.gain.exponentialRampToValueAtTime(.0001,t+.06);n.connect(ng);ng.connect(master);n.start(t);trackNode(n);trackNode(o)}
  function scheduleMusic(){const base=audio.currentTime+.08;for(const r of rounds){tone(520,base+(r.demoStart-1)*beat,.08,'sine',.10);tone(760,base+(r.playStart-1)*beat,.08,'sine',.14)}for(const e of demoEvents){smallDrum(base+e.time,e.kind==='h'?.25:.22);if(e.kind==='h')smallDrum(base+e.time+e.dur,.16)}}
  function showRulesPage(){if(landing)landing.classList.add('hidden');end.classList.add('hidden');menu.classList.remove('hidden')}
  function startGame(){initAudio();audio.resume();stopHomeBgm();stopScheduledAudio();cancelAnimationFrame(raf);buildTimeline();score=0;combo=0;maxCombo=0;hp=5;hits=0;particles=[];faceShake=0;holding=null;lastDemo=-1;lastRound=-1;scoreEl.textContent='0';comboEl.textContent='0';updateHealth();menu.classList.add('hidden');if(landing)landing.classList.add('hidden');end.classList.add('hidden');running=true;startTime=audio.currentTime+.08;scheduleMusic();raf=requestAnimationFrame(loop)}
  function now(){return audio?audio.currentTime-startTime:0}function updateHealth(){healthEl.innerHTML='';for(let i=0;i<5;i++){const div=document.createElement('div');div.className='heart';div.innerHTML=`<svg viewBox="0 0 32 32"><path d="M16 28 C7 20 2 16 2 9 A7 7 0 0 1 15 5 A7 7 0 0 1 30 9 C30 16 25 20 16 28Z" fill="${i<hp?'#ff4f6d':'#ddd'}" stroke="#31263e" stroke-width="3"/></svg>`;healthEl.appendChild(div)}}
  function currentPhase(t){const tb=t/beat;for(const r of rounds){if(tb>=r.demoStart-1&&tb<r.demoStart)return{mode:'readyDemo',round:r};if(tb>=r.demoStart&&tb<r.playStart-1)return{mode:'demo',round:r};if(tb>=r.playStart-1&&tb<r.playStart)return{mode:'readyPlay',round:r};if(tb>=r.playStart&&tb<r.endBeat)return{mode:'play',round:r}}return{mode:'rest',round:null}}
  function setPhase(p){let text='準備',cls='phase rest';if(p.mode==='readyDemo')text='第 '+(p.round.index+1)+' 題：準備聽';if(p.mode==='demo'){text='聽示範，不要按';cls='phase'}if(p.mode==='readyPlay'){text='預備，換你！';cls='phase player'}if(p.mode==='play'){text='換你打！照剛剛節奏';cls='phase player'}phaseEl.textContent=text;phaseEl.className=cls}
  function show(text,color){feedback.textContent=text;feedback.style.color=color;feedback.classList.remove('flash');void feedback.offsetWidth;feedback.classList.add('flash')}function judge(dt){const a=Math.abs(dt);if(a<.055)return['PERFECT!',1000,'#48f08a'];if(a<.095)return['GOOD!',650,'#fff56b'];if(a<hitWindow)return['OK!',350,'#77c9ff'];return null}
